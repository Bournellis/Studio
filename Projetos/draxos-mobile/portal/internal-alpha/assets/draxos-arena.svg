<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Draxos ritual arena</title>
  <desc id="desc">Private alpha artwork showing two arcane figures in a ritual arena.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071019"/>
      <stop offset="0.48" stop-color="#111824"/>
      <stop offset="1" stop-color="#22131f"/>
    </linearGradient>
    <radialGradient id="rift" cx="50%" cy="42%" r="50%">
      <stop offset="0" stop-color="#f3d48a" stop-opacity="0.85"/>
      <stop offset="0.23" stop-color="#48d4c4" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#7c294c" stop-opacity="0.2"/>
